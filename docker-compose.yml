services:
  backend:
    build: ./backend
    container_name: hacienda-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/src:/app/src
      - backend-data:/app/data
    environment:
      - PORT=8001
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hacienda-frontend
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8001/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
